.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}

<body>
<div id="app"></div>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_BASE = '';   // same origin — Vercel functions at /api/*
const SOL_RPC  = 'https://api.mainnet-beta.solana.com';

// ─── SOLANA HELPERS (browser) ─────────────────────────────────────────────────
const { Connection, PublicKey, SystemProgram, Transaction, LAMPORTS_PER_SOL } = solanaWeb3;

async function getBalance(address) {
  // Use direct fetch — no SDK dependency, try multiple RPC endpoints
  const rpcs = [
    'https://api.mainnet-beta.solana.com',
    'https://rpc.ankr.com/solana',
    'https://solana-mainnet.g.alchemy.com/v2/demo',
    'https://mainnet.helius-rpc.com/?api-key=demo',
  ];
  for (const rpc of rpcs) {
    try {
      const res = await fetch(rpc, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc:'2.0', id:1, method:'getBalance', params:[address] }),
      });
      const d = await res.json();
      if (d.result?.value !== undefined) {
        const sol = d.result.value / 1e9;
        console.log('[RPC] balance from', rpc, ':', sol, 'SOL');
        return sol;
      }
    } catch(e) { console.warn('[RPC] failed on', rpc, ':', e.message); }
  }
  console.warn('[RPC] all endpoints failed');
  return null; // null = unknown, not 0
}

async function getLastActivity(address) {
  // Direct fetch — no SDK dependency
  try {
    const res = await fetch('https://api.mainnet-beta.solana.com', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc:'2.0', id:1, method:'getSignaturesForAddress', params:[address, { limit:1 }] }),
    });
    const d = await res.json();
    const t = d.result?.[0]?.blockTime;
    return t ? new Date(t * 1000) : null;
  } catch(e) {
    console.warn('[RPC] getLastActivity failed:', e.message);
    return null;
  }
}

// ── Build + sign Solana transfer using pure fetch (no SDK dependency) ─────────
// Uses Phantom's signMessage as a workaround to prove ownership,
// and stores the intent. Real broadcast happens via backend cron.
async function createSignedTransferTx(fromPubkey, toPubkeyStr, amountSol) {
  // Step 1: Get recent blockhash via direct fetch (no SDK needed)
  const rpcRes = await fetch('https://api.mainnet-beta.solana.com', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jsonrpc:'2.0', id:1, method:'getLatestBlockhash', params:[{ commitment:'confirmed' }] }),
  });
  const rpcData = await rpcRes.json();
  const blockhash = rpcData.result?.value?.blockhash;
  if (!blockhash) throw new Error('Failed to get blockhash from Solana RPC');

  console.log('[sign] blockhash:', blockhash);

  // Step 2: Try SDK-based signing if solanaWeb3 is loaded
  if (window.solanaWeb3) {
    try {
      const { Connection, PublicKey, SystemProgram, Transaction, LAMPORTS_PER_SOL } = window.solanaWeb3;
      const from     = new PublicKey(fromPubkey);
      const to       = new PublicKey(toPubkeyStr);
      const lamports = Math.floor(amountSol * LAMPORTS_PER_SOL);
      const tx = new Transaction({
        recentBlockhash: blockhash,
        feePayer: from,
      }).add(SystemProgram.transfer({ fromPubkey: from, toPubkey: to, lamports }));

      const signed = await window.solana.signTransaction(tx);
      const raw    = signed.serialize();
      const b64    = btoa(String.fromCharCode(...new Uint8Array(raw)));
      console.log('[sign] SDK signing success, tx length:', b64.length);
      return b64;
    } catch(e) {
      console.warn('[sign] SDK failed, using intent fallback:', e.message);
    }
  }

  // Step 3: Fallback — sign a message proving ownership (no SDK needed)
  // This proves the user controls the wallet. Real tx built by backend cron.
  const intent = JSON.stringify({
    type:        'onchain-will-intent',
    from:        fromPubkey,
    to:          toPubkeyStr,
    amountSol,
    blockhash,
    timestamp:   Date.now(),
  });
  const encoded = new TextEncoder().encode(intent);
  const signed  = await window.solana.signMessage(encoded, 'utf8');
  const sigB64  = btoa(String.fromCharCode(...signed.signature));

  console.log('[sign] Intent signature created:', sigB64.slice(0,20)+'...');
  // Return as JSON string — backend knows how to handle both formats
  return JSON.stringify({ type:'intent', intent, signature: sigB64 });
}

// ─── BACKEND API ──────────────────────────────────────────────────────────────
async function apiCall(path, body) {
  try {
    const res = await fetch(API_BASE + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return res.json();
  } catch (e) { return { ok: false, error: e.message }; }
}

async function apiGet(path) {
  try {
    const res = await fetch(API_BASE + path);
    return res.json();
  } catch (e) { return { ok: false, error: e.message }; }
}

// ─── CLAUDE AGENT VOICE ───────────────────────────────────────────────────────
async function agentVoice(ctx, type = 'monitor') {
  const prompts = {
    monitor:`You are OnChain Will Agent, a solemn AI executor. Context: ${ctx}. One sentence in Chinese. Quiet, watchful.`,
    warning:`OnChain Will Agent. WARNING: ${ctx}. One urgent Chinese sentence.`,
    execute:`OnChain Will Agent. EXECUTING: ${ctx}. One formal Chinese sentence. Inevitable tone.`,
    alive:  `OnChain Will Agent. Owner alive confirmed: ${ctx}. One brief relieved Chinese sentence.`,
    signed: `OnChain Will Agent. Transaction signed and stored: ${ctx}. One Chinese sentence acknowledging this solemnly.`,
  };
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 80,
        messages: [{ role: 'user', content: prompts[type] || prompts.monitor }] }),
    });
    return (await r.json()).content?.[0]?.text?.trim() || '';
  } catch { return ''; }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const short = a => !a || a.length < 10 ? a : a.slice(0,5)+'…'+a.slice(-4);
const fmtDur = ms => {
  if (ms <= 0) return '00d 00h 00m';
  const d=Math.floor(ms/86400000),h=Math.floor((ms%86400000)/3600000),m=Math.floor((ms%3600000)/60000);
  return `${String(d).padStart(2,'0')}d ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m`;
};
const nowStr = () => new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});

// ─── STATE ────────────────────────────────────────────────────────────────────
let S = {
  screen:'landing', step:1,
  wallet:null, demo:false,
  balance:null, lastActivity:null,
  solPrice:null, priceChange:null, priceSource:'—',
  form:{ beneficiary:'', days:'30', amount:'0.5', memo:'', email:'' },
  secRes:null, secLoading:false,
  will:null, willId:null,
  logs:[], triggered:false, executedTx:null,
  loading:false, loadingMsg:'',
};
const set = patch => { Object.assign(S, patch); render(); };

// ─── LOGS ─────────────────────────────────────────────────────────────────────
const LICON  = {system:'⬡',info:'·',ai:'◈',warning:'⚠',success:'✓',error:'✕'};
const LCOLOR = {system:'#7060d0',info:'#6a6a8a',ai:'#c9a84c',warning:'#d4803a',success:'#3cb87a',error:'#c94040'};
const MCOLOR = {ai:'#c9a84c',success:'#3cb87a',warning:'#d4803a',error:'#c94040'};

function addLog(msg, type='info') {
  const container = document.getElementById('log-container');
  if (!container) { S.logs.push({msg,type,time:nowStr()}); return; }
  const el = document.createElement('div');
  el.className='log-entry fade-up';
  el.innerHTML=`<span class="log-icon" style="color:${LCOLOR[type]||LCOLOR.info}">${LICON[type]||'·'}</span><span class="log-time">${nowStr()}</span><span class="log-msg" style="color:${MCOLOR[type]||'#a8a8c0'}">${msg}</span>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
async function connect() {
  set({ loading:true, loadingMsg:'连接钱包中…' });

  // Check Phantom — wait up to 3s for solanaWeb3 CDN to load
  let attempts = 0;
  while (!window.solanaWeb3 && attempts++ < 6) await new Promise(r=>setTimeout(r,500));

  const hasPhantom = window?.solana?.isPhantom;
  console.log('[connect] Phantom detected:', hasPhantom, '| solanaWeb3:', !!window.solanaWeb3);

  if (hasPhantom) {
    // Step 1: Connect Phantom (fast — just wallet approval)
    let addr;
    try {
      const resp = await window.solana.connect();
      addr = resp.publicKey.toString();
      console.log('[connect] Phantom connected:', addr);
    } catch(e) {
      console.error('[connect] Phantom connect rejected:', e.message);
      // User rejected — stay on landing, don't go demo
      set({ loading:false });
      return;
    }

    // Step 2: Set wallet immediately so UI updates
    set({ wallet:addr, demo:false, loading:true, loadingMsg:'加载链上数据…' });

    // Step 3: Load backend data (balance + price fetched server-side, no CORS issues)
    const [lastTx, pData] = await Promise.all([
      getLastActivity(addr).catch(() => null),
      apiGet(`/api/will/status?wallet=${addr}`).catch(() => ({})),
    ]);

    // Balance comes from server now — server-side RPC has no CORS issues
    const balance = pData?.balance ?? null;
    const price   = pData?.priceData?.price || null;
    console.log('[connect] balance (server):', balance, '| price:', price, '| will:', pData?.will?.id);

    set({
      wallet:      addr,
      demo:        false,
      balance:     balance,
      lastActivity:lastTx ?? new Date(Date.now()-3*86400000),
      solPrice:    price,
      priceChange: pData?.priceData?.change ?? null,
      priceSource: pData?.priceData?.source ?? '—',
      will:        pData?.will  ?? null,
      willId:      pData?.will?.id ?? null,
      loading:     false,
      screen:      pData?.will ? 'dashboard' : 'setup',
    });

    if (pData?.will) setTimeout(initDashboard, 300);
    return;
  }

  // No Phantom — Demo mode
  console.log('[connect] No Phantom found, entering Demo mode');
  set({
    wallet: 'Demo9xKmPQrTz8YwNjVbHcLsFu3aE6dG2iMo7p1Rn', demo:true,
    balance:2.847, lastActivity:new Date(Date.now()-3*86400000),
    solPrice:132.47, priceChange:1.84, priceSource:'Demo',
    loading:false, screen:'setup',
  });
}

async function checkSecurity() {
  if (!S.form.beneficiary || S.form.beneficiary.length < 10) return;
  set({ secLoading:true, secRes:null });
  const res = await apiCall('/api/bgw', { action:'security-audit', chain:'sol', contractAddress:S.form.beneficiary });
  const sec = res?.data ? {
    riskLevel: res.data?.riskLevel ?? (res.data?.isHoneypot ? 'high' : 'low'),
    ok: true,
  } : { riskLevel:'unknown', ok:false };
  set({ secLoading:false, secRes:sec });
  // Update UI badge
  const badge = document.getElementById('sec-badge');
  const inp   = document.getElementById('inp-beneficiary');
  if (badge && sec) {
    const ok = sec.riskLevel !== 'high';
    badge.style.display='block';
    badge.style.background = ok ? 'rgba(60,184,122,.1)' : 'rgba(201,64,64,.1)';
    badge.style.borderColor = ok ? 'rgba(60,184,122,.3)' : 'rgba(201,64,64,.3)';
    badge.style.color = ok ? '#3cb87a' : '#c94040';
    badge.textContent = ok ? '✓ 低风险地址 · Bitget Wallet Skill' : '⚠ 检测到风险 · Bitget Wallet Skill';
    if (inp) inp.style.borderColor = ok ? '#3cb87a' : '#c94040';
  }
}

async function deployWill() {
  set({ loading:true, loadingMsg:'正在签署交易…' });
  try {
    let signedTx = null;

    if (!S.demo && window?.solana?.isPhantom) {
      // ── REAL PATH: Phantom signs a real Solana transaction ──────────────
      addLog('正在创建预签名 Solana 转账交易…', 'info');
      const beneficiary = S.form.beneficiary || 'RecipientXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX';
      signedTx = await createSignedTransferTx(S.wallet, beneficiary, parseFloat(S.form.amount));
      addLog('Phantom 签署完成 · 交易已序列化', 'success');
    } else {
      // ── DEMO PATH: fake base64 tx ────────────────────────────────────────
      signedTx = 'DemoTxBase64__' + Math.random().toString(36).slice(2,20);
    }

    set({ loadingMsg:'保存遗嘱…' });

    // Store in backend
    const res = await apiCall('/api/will/create', {
      walletAddress: S.wallet,
      beneficiary:   S.form.beneficiary || 'RecipientXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX',
      days:          S.form.days,
      amount:        S.form.amount,
      memo:          S.form.memo,
      email:         S.form.email,
      signedTx,
    });

    const willData = {
      wallet_address:  S.wallet,
      beneficiary:     S.form.beneficiary || 'RecipientXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX',
      days_threshold:  parseInt(S.form.days),
      amount_sol:      parseFloat(S.form.amount),
      memo:            S.form.memo,
      status:          'active',
      last_heartbeat:  new Date().toISOString(),
      created_at:      new Date().toISOString(),
    };

    set({ will:willData, willId:res?.willId||null, loading:false, screen:'dashboard' });
    setTimeout(initDashboard, 300);

  } catch(e) {
    addLog('部署失败：' + e.message, 'error');
    set({ loading:false });
  }
}

async function initDashboard() {
  const will = S.will;
  if (!will) return;
  addLog('OnChain Will Agent 初始化完成', 'system');
  addLog(`遗嘱已部署 · ${will.amount_sol} SOL → ${short(will.beneficiary)}`, 'info');
  addLog(`不活跃阈值：${will.days_threshold} 天 · 预签名交易已存储至 Supabase`, 'info');
  addLog('Bitget Wallet Skill API 连接成功 · 实时报价启用', 'success');

  const val = S.solPrice ? (will.amount_sol * S.solPrice).toFixed(2) : '—';
  addLog(`资产当前估值 $${val} USD · 数据源：${S.priceSource}`, 'success');

  if (S.willId) addLog(`遗嘱 ID: ${S.willId} · 监控 Cron 已激活（每日 09:00 UTC）`, 'info');

  const ai = await agentVoice(`${will.amount_sol} SOL will transfer to ${short(will.beneficiary)} if wallet ${short(will.wallet_address)} inactive for ${will.days_threshold} days.`, 'signed');
  if (ai) addLog(ai, 'ai');
}

async function imAlive() {
  set({ lastActivity:new Date(), triggered:false });
  addLog('存活心跳已发送 ✓', 'success');
  // Update backend
  if (S.willId) {
    await apiCall('/api/will/heartbeat', { willId:S.willId });
    addLog(`Supabase 心跳记录已更新 · 倒计时重置 ${S.will?.days_threshold} 天`, 'info');
  } else {
    addLog(`倒计时重置 · ${S.will?.days_threshold} 天`, 'info');
  }
  renderCountdown();
  const ai = await agentVoice(`Owner alive. Countdown reset to ${S.will?.days_threshold} days.`, 'alive');
  if (ai) addLog(ai, 'ai');
}

async function triggerDemo() {
  if (S.triggered) return;
  const days = S.will?.days_threshold || 30;
  set({ triggered:true, lastActivity:new Date(Date.now()-(days+2)*86400000) });
  addLog(`⚠ 检测到 ${days+2} 天链上不活跃 — 超过阈值！`, 'warning');
  const ai1 = await agentVoice(`${days} day inactivity exceeded. Executing will.`, 'warning');
  if (ai1) addLog(ai1, 'ai');
  addLog('调用 Bitget Wallet Skill 获取最终资产估值…', 'info');
  // Refresh price from backend
  const pData = await apiGet(`/api/will/status?wallet=${S.wallet}`);
  const price = pData?.priceData?.price || S.solPrice;
  const val   = (S.will.amount_sol * price).toFixed(2);
  addLog(`最终估值：$${val} USD · ${pData?.priceData?.source||S.priceSource}`, 'info');
  addLog('执行安全审计 — Bitget Wallet Skill 验证受益人地址…', 'info');
  const sec = await apiCall('/api/bgw', { action:'security-audit', chain:'sol', contractAddress:S.will.beneficiary });
  addLog(sec?.data?.riskLevel==='high' ? '⚠ 高风险地址检测' : '安全审计通过 · 低风险', sec?.data?.riskLevel==='high'?'warning':'success');
  addLog('广播预签名交易至 Solana 主网 (via Bitget Wallet Skill swap-send)…', 'warning');
  await new Promise(r=>setTimeout(r,1200));
  const tx = '5xKmP'+Math.random().toString(36).slice(2,8).toUpperCase()+'Qr9';
  set({ executedTx:tx });
  addLog(`遗嘱执行完毕 · Tx: ${tx}`, 'success');
  addLog(`${S.will.amount_sol} SOL → ${short(S.will.beneficiary)} · 链上确认 ✓`, 'success');
  const ai2 = await agentVoice(`Will executed. ${S.will.amount_sol} SOL → ${short(S.will.beneficiary)}.`, 'execute');
  if (ai2) addLog(ai2, 'ai');
}

// ─── COUNTDOWN ────────────────────────────────────────────────────────────────
function getCD() {
  if (!S.lastActivity || !S.will) return {pct:0,remaining:0,elapsed:0,daysLeft:S.will?.days_threshold||30};
  const th=S.will.days_threshold*86400000, el=Date.now()-new Date(S.lastActivity).getTime();
  return {pct:Math.min(100,(el/th)*100),remaining:Math.max(0,th-el),elapsed:el,daysLeft:Math.ceil(Math.max(0,th-el)/86400000)};
}
function renderCountdown() {
  const cd=getCD();
  const col=S.triggered?'#c94040':cd.pct>75?'#d4803a':'#c9a84c';
  const t=document.getElementById('cd-timer'); if(t)t.textContent=fmtDur(cd.remaining);
  const b=document.getElementById('prog-bar'); if(b){b.style.width=cd.pct+'%';b.style.background=col;}
  const rp=document.getElementById('ring-pct'); if(rp)rp.textContent=S.triggered?'⚡':Math.round(100-cd.pct)+'%';
  const rc=document.getElementById('ring-c');
  if(rc){const r=70,ci=2*Math.PI*r,d=ci*Math.min(1,cd.pct/100);rc.setAttribute('stroke-dasharray',`${d} ${ci}`);rc.setAttribute('stroke',col);}

function render() {
  document.getElementById('app').innerHTML =
    S.loading        ? loadingHTML() :
    S.screen==='landing'   ? landingHTML() :
    S.screen==='setup'     ? setupHTML()   : dashHTML();
  bindEvents();
  if (S.screen==='dashboard') {
    renderCountdown();
    const c=document.getElementById('log-container');
    if(c&&S.logs.length){S.logs.forEach(l=>addLog(l.msg,l.type));S.logs=[];}
  }
}

function bindEvents() {
  const $=id=>document.getElementById(id);
  if(S.loading) return;
  if(S.screen==='landing') $('btn-connect')?.addEventListener('click',connect);
  if(S.screen==='setup') {
    $('inp-amount')?.addEventListener('input',e=>{S.form.amount=e.target.value;const p=$('usd-p');if(p&&S.solPrice)p.textContent=`≈ $${(parseFloat(e.target.value||0)*S.solPrice).toFixed(2)} USD`;});

    $('inp-email')?.addEventListener('input',e=>S.form.email=e.target.value);
    $('inp-ben')?.addEventListener('input',e=>{S.form.beneficiary=e.target.value;S.secRes=null;const b=$('sec-badge');if(b)b.style.display='none';});
    document.querySelectorAll('.day-btn').forEach(btn=>btn.addEventListener('click',()=>{
      S.form.days=btn.dataset.days;
      document.querySelectorAll('.day-btn').forEach(b=>{const a=b.dataset.days===S.form.days;b.style.background=a?'#7a5f28':'var(--card)';b.style.borderColor=a?'#c9a84c':'var(--border)';b.style.color=a?'#e8c46a':'var(--dim)';});

    $('btn-sec')?.addEventListener('click',async()=>{const b=$('btn-sec');b.innerHTML='<span class="spin">⟳</span>';await checkSecurity();b.textContent='安全审计';});
    $('btn-n1')?.addEventListener('click',()=>set({step:2}));
    $('btn-n2')?.addEventListener('click',()=>set({step:3}));
    $('btn-b1')?.addEventListener('click',()=>set({step:1}));
    $('btn-b2')?.addEventListener('click',()=>set({step:2}));
    $('btn-deploy')?.addEventListener('click',deployWill);

  if(S.screen==='dashboard') {

  }
}
