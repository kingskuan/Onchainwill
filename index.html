<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OnChain Will — 链上遗嘱</title>
<meta name="description" content="设定条件，自动将你的 Solana 资产转给指定地址。"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚱</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070e;--card:#0d0d1a;--card2:#111120;--border:#1c1c30;--borderh:#2e2e50;
  --gold:#c9a84c;--gold-dim:#7a5f28;--gold-bright:#e8c46a;
  --text:#e8e4dc;--dim:#6a6a8a;--mid:#a8a8c0;
  --red:#c94040;--green:#3cb87a;--violet:#7060d0;
  --serif:'Cormorant Garant',Georgia,serif;
  --mono:'DM Mono','Courier New',monospace;
  --sans:'DM Sans',system-ui,sans-serif;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0d0d1a}
::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
button{cursor:pointer;border:none;font-family:var(--sans)}
input,textarea{outline:none;font-family:var(--mono);background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:12px 14px;width:100%;font-size:14px}
input::placeholder{color:#3a3a5a}
a{color:inherit}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.7;transform:scale(1.025)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{opacity:.4}50%{opacity:.9}}

.fade-up{animation:fadeUp .4s ease forwards}
.pulse{animation:pulse 3s ease-in-out infinite}
.blink{animation:blink 1.4s ease infinite;display:inline-block}
.spin{animation:spin 1s linear infinite;display:inline-block}

/* ── Layout helpers ── */
.center{display:flex;align-items:center;justify-content:center}
.col{display:flex;flex-direction:column}
.row{display:flex;align-items:center}
.between{display:flex;justify-content:space-between;align-items:center}

/* ── Screen wrapper ── */
.screen{max-width:640px;margin:0 auto;padding:32px 20px;min-height:100vh;display:flex;flex-direction:column}
.dash-screen{max-width:900px;margin:0 auto;padding:22px 18px}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:16px}

/* ── Mono label ── */
.label{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}

/* ── Badges ── */
.badge{padding:2px 9px;border-radius:10px;font-family:var(--mono);font-size:9px}

/* ── Log entry ── */
.log-entry{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid rgba(28,28,48,.3);animation:fadeUp .35s ease forwards}
.log-icon{font-family:var(--mono);font-size:11px;min-width:10px;flex-shrink:0}
.log-time{font-family:var(--mono);font-size:10px;color:var(--dim);min-width:62px;flex-shrink:0}
.log-msg{font-family:var(--sans);font-size:12px;line-height:1.55}

/* ── Step indicator ── */
.steps{display:flex;align-items:center;margin-bottom:36px}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;flex-shrink:0;transition:all .3s;border:1px solid}
.step-line{flex:1;height:1px;margin:0 6px}

/* ── Day buttons ── */
.day-btns{display:flex;gap:8px;margin-bottom:28px}
.day-btn{flex:1;padding:9px 2px;border-radius:5px;font-family:var(--mono);font-size:11px;transition:all .2s;border:1px solid}

/* ── Primary button ── */
.btn-primary{padding:14px;border-radius:6px;font-size:14px;font-weight:500;width:100%;letter-spacing:.3px;transition:opacity .2s}
.btn-primary:hover{opacity:.85}
.btn-ghost{padding:13px;border-radius:6px;font-size:13px;background:transparent;border:1px solid var(--border);color:var(--dim);transition:opacity .2s}

/* ── Dashboard grid ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.stat-box{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.stat-val{font-family:var(--serif);font-size:22px;font-weight:300;line-height:1}
.stat-sub{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:4px}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.action-btn{padding:13px 16px;border-radius:8px;font-size:13px;font-weight:500;transition:background .2s}

@media(max-width:600px){
  .dash-grid{grid-template-columns:1fr}
  .action-grid{grid-template-columns:1fr}
  .screen{padding:24px 16px}
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
// Public demo keys from bitget-wallet-skill (read-only, 2 QPS, no IP whitelist needed)
// https://github.com/bitget-wallet-ai-lab/bitget-wallet-skill
const BGW_KEY    = '6AE25C9BFEEC4D815097ECD54DDE36B9A1F2B069';
const BGW_SECRET = 'C2638D162310C10D5DAFC8013871F2868E065040';
const BGW_BASE   = 'https://bopenapi.bgwapi.io';

// ─── HMAC-SHA256 (Web Crypto API — works in all modern browsers) ──────────────
async function hmacSign(secret, message) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey(
    'raw', enc.encode(secret), {name:'HMAC',hash:'SHA-256'}, false, ['sign']
  );
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(message));
  // Base64 encode
  return btoa(String.fromCharCode(...new Uint8Array(sig)));
}

// Bitget Wallet API signature — matches Node.js reference implementation exactly
async function bgwSignature(apiPath, bodyStr, timestamp, queryParams={}) {
  const base = { apiPath, body: bodyStr, 'x-api-key': BGW_KEY, 'x-api-timestamp': timestamp };
  for (const [k,v] of Object.entries(queryParams)) base[k] = String(v);
  const sorted = Object.fromEntries(Object.keys(base).sort().map(k=>[k,base[k]]));
  return hmacSign(BGW_SECRET, JSON.stringify(sorted));
}

async function bgwFetch(path, body={}) {
  const ts      = String(Date.now());
  const bodyStr = JSON.stringify(body);
  const sig     = await bgwSignature(path, bodyStr, ts);
  const res = await fetch(BGW_BASE + path, {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': BGW_KEY,
      'x-api-timestamp': ts,
      'x-api-signature': sig,
    },
    body: bodyStr,
  });
  if (!res.ok) throw new Error(`BGW ${res.status}`);
  return res.json();
}

// ─── BITGET WALLET SKILL COMMANDS ────────────────────────────────────────────
async function bgwTokenPrice(chain='sol', contractAddress='') {
  try {
    const d = await bgwFetch('/api/v1/market/tokenPrice', {chain, contractAddress});
    const p = d?.data?.price || d?.data?.data?.[0]?.price || d?.data?.list?.[0]?.price;
    const c = d?.data?.change24h || d?.data?.data?.[0]?.change24h || 0;
    if (p) return { price: parseFloat(p), change: parseFloat(c), source: 'Bitget Wallet Skill ✓' };
  } catch(e) { console.warn('BGW price failed:', e.message); }
  // Fallback: CoinGecko (no key needed)
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd&include_24hr_change=true');
    const d = await r.json();
    if (d?.solana?.usd) return { price: d.solana.usd, change: +(d.solana.usd_24h_change||0).toFixed(2), source: 'CoinGecko (fallback)' };
  } catch {}
  return { price: 132.47, change: 1.84, source: 'Demo' };
}

async function bgwSecurityAudit(chain='sol', contractAddress) {
  try {
    const d = await bgwFetch('/api/v1/token/security', {chain, contractAddress});
    const r = d?.data?.riskLevel || (d?.data?.isHoneypot ? 'high' : 'low');
    return { riskLevel: r, ok: true };
  } catch { return { riskLevel: 'unknown', ok: false }; }
}

// ─── SOLANA RPC ───────────────────────────────────────────────────────────────
async function solBalance(addr) {
  try {
    const r = await fetch('https://api.mainnet-beta.solana.com',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({jsonrpc:'2.0',id:1,method:'getBalance',params:[addr]})
    });
    const d = await r.json();
    return (d.result?.value||0)/1e9;
  } catch { return null; }
}

async function solLastTx(addr) {
  try {
    const r = await fetch('https://api.mainnet-beta.solana.com',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({jsonrpc:'2.0',id:1,method:'getSignaturesForAddress',params:[addr,{limit:1}]})
    });
    const d = await r.json();
    const t = d.result?.[0]?.blockTime;
    return t ? new Date(t*1000) : null;
  } catch { return null; }
}

// ─── CLAUDE AGENT VOICE ───────────────────────────────────────────────────────
async function agentVoice(ctx, type='monitor') {
  const p = {
    monitor:`You are OnChain Will Agent, a solemn AI executor on Solana. Context: ${ctx}. One sentence in Chinese. Quiet, watchful.`,
    warning:`You are OnChain Will Agent. INACTIVITY WARNING: ${ctx}. One urgent Chinese sentence.`,
    execute:`You are OnChain Will Agent. WILL EXECUTING: ${ctx}. One formal Chinese sentence. Tone: inevitable.`,
    alive:  `You are OnChain Will Agent. Owner alive: ${ctx}. One brief relieved Chinese sentence.`,
  };
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:80,
        messages:[{role:'user',content:p[type]||p.monitor}]})
    });
    const d = await r.json();
    return d.content?.[0]?.text?.trim()||'';
  } catch { return ''; }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const short = a => (!a||a.length<10) ? a : a.slice(0,5)+'…'+a.slice(-4);
const fmtDur = ms => {
  if(ms<=0) return '00d 00h 00m';
  const d=Math.floor(ms/86400000),h=Math.floor((ms%86400000)/3600000),m=Math.floor((ms%3600000)/60000);
  return `${String(d).padStart(2,'0')}d ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m`;
};
const nowStr = () => new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});

// ─── STATE ────────────────────────────────────────────────────────────────────
let S = {
  screen: 'landing',   // landing | setup | dashboard
  step: 1,
  wallet: null,
  demo: false,
  balance: null,
  solPrice: null,
  priceChange: null,
  priceSource: '—',
  lastActivity: null,
  form: { beneficiary:'', days:'30', amount:'0.5', memo:'' },
  secRes: null,
  secLoading: false,
  will: null,
  logs: [],
  triggered: false,
  executedTx: null,
  deploying: false,
};

function setState(patch) { Object.assign(S, patch); render(); }

// ─── LOGS ─────────────────────────────────────────────────────────────────────
const LOG_ICON  = {system:'⬡',info:'·',ai:'◈',warning:'⚠',success:'✓',error:'✕'};
const LOG_COLOR = {system:'#7060d0',info:'#6a6a8a',ai:'#c9a84c',warning:'#d4803a',success:'#3cb87a',error:'#c94040'};
const MSG_COLOR = {ai:'#c9a84c',success:'#3cb87a',warning:'#d4803a'};

function addLog(msg, type='info') {
  S.logs = [...S.logs.slice(-59), {id:Date.now()+Math.random(), msg, type, time:nowStr()}];
  // Don't full re-render, just append to log container
  const container = document.getElementById('log-container');
  if (container) {
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `
      <span class="log-icon" style="color:${LOG_COLOR[type]||LOG_COLOR.info}">${LOG_ICON[type]||'·'}</span>
      <span class="log-time">${nowStr()}</span>
      <span class="log-msg" style="color:${MSG_COLOR[type]||'#a8a8c0'}">${msg}</span>
    `;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
  }
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
async function connect() {
  if (window?.solana?.isPhantom) {
    try {
      const resp = await window.solana.connect();
      const addr = resp.publicKey.toString();
      const [bal, lastTx, priceData] = await Promise.all([solBalance(addr), solLastTx(addr), bgwTokenPrice()]);
      setState({ wallet:addr, demo:false, balance:bal??2.847,
        lastActivity:lastTx??new Date(Date.now()-3*86400000),
        solPrice:priceData.price, priceChange:priceData.change, priceSource:priceData.source,
        screen:'setup' });
      return;
    } catch {}
  }
  // Demo mode
  const priceData = await bgwTokenPrice();
  setState({ wallet:'Demo9xKmPQrTz8YwNjVbHcLsFu3aE6dG2iMo7p1Rn', demo:true,
    balance:2.847, lastActivity:new Date(Date.now()-3*86400000),
    solPrice:priceData.price, priceChange:priceData.change, priceSource:priceData.source,
    screen:'setup' });
}

async function checkSecurity() {
  if (!S.form.beneficiary || S.form.beneficiary.length < 10) return;
  setState({ secLoading:true, secRes:null });
  const res = await bgwSecurityAudit('sol', S.form.beneficiary);
  setState({ secLoading:false, secRes:res });
}

async function deployWill() {
  setState({ deploying:true });
  const will = {
    beneficiary: S.form.beneficiary || 'RecipientXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX',
    days: parseInt(S.form.days)||30,
    amount: parseFloat(S.form.amount)||0.5,
    memo: S.form.memo,
    wallet: S.wallet,
    createdAt: new Date(),
    preSigned: 'TxBase64__' + Math.random().toString(36).slice(2,18),
  };
  setState({ will, screen:'dashboard', deploying:false });

  // Async logs after render
  setTimeout(async () => {
    addLog('OnChain Will Agent 初始化完成', 'system');
    addLog(`遗嘱已部署 · ${will.amount} SOL → ${short(will.beneficiary)}`, 'info');
    addLog(`不活跃阈值：${will.days} 天 · 预签名交易存储完毕`, 'info');
    addLog('正在获取 Bitget Wallet Skill 实时报价…', 'info');
    const p = await bgwTokenPrice();
    const val = (will.amount * p.price).toFixed(2);
    setState({ solPrice:p.price, priceChange:p.change, priceSource:p.source });
    addLog(`资产估值 $${val} USD · 数据源：${p.source}`, 'success');
    const ai = await agentVoice(`${will.amount} SOL will transfer to ${short(will.beneficiary)} if inactive for ${will.days} days. Value: $${val}.`);
    if (ai) addLog(ai, 'ai');
  }, 300);
}

async function imAlive() {
  setState({ lastActivity: new Date(), triggered: false });
  addLog('存活心跳接收 — 链上验证通过 ✓', 'success');
  addLog(`倒计时重置 · ${S.will?.days} 天重新计数`, 'info');
  const ai = await agentVoice(`Owner alive. Countdown reset to ${S.will?.days} days.`, 'alive');
  if (ai) addLog(ai, 'ai');
  renderCountdown();
}

async function triggerDemo() {
  const fakeLastActivity = new Date(Date.now() - (S.will.days + 2) * 86400000);
  setState({ triggered:true, lastActivity: fakeLastActivity });
  addLog(`⚠ 检测到 ${S.will.days+2} 天不活跃 — 超过阈值！`, 'warning');
  const ai1 = await agentVoice(`${S.will.days} day inactivity exceeded. Executing will.`, 'warning');
  if (ai1) addLog(ai1, 'ai');

  addLog('调用 Bitget Wallet Skill 获取最终估值…', 'info');
  const p = await bgwTokenPrice();
  addLog(`最终估值：$${(S.will.amount*p.price).toFixed(2)} USD · ${p.source}`, 'info');

  addLog('执行安全审计 — 验证受益人地址…', 'info');
  const sec = await bgwSecurityAudit('sol', S.will.beneficiary);
  addLog(sec.riskLevel==='high' ? '⚠ 检测到风险地址' : '安全审计通过 · 低风险', sec.riskLevel==='high'?'warning':'success');

  addLog('广播预签名交易至 Solana 主网…', 'warning');
  await new Promise(r=>setTimeout(r,1200));
  const tx = '5xKmP'+Math.random().toString(36).slice(2,8).toUpperCase()+'Qr9';
  setState({ executedTx: tx });
  addLog(`遗嘱执行完毕 · Tx: ${tx}`, 'success');
  addLog(`${S.will.amount} SOL → ${short(S.will.beneficiary)} · 链上确认`, 'success');
  const ai2 = await agentVoice(`Will executed. ${S.will.amount} SOL → ${short(S.will.beneficiary)}.`, 'execute');
  if (ai2) addLog(ai2, 'ai');
}

// ─── COUNTDOWN ────────────────────────────────────────────────────────────────
function getCD() {
  if (!S.lastActivity || !S.will) return {pct:0,remaining:0,elapsed:0,daysLeft:S.will?.days||30};
  const th = S.will.days * 86400000;
  const el = Date.now() - S.lastActivity.getTime();
  return { pct:Math.min(100,(el/th)*100), remaining:Math.max(0,th-el), elapsed:el, daysLeft:Math.ceil(Math.max(0,th-el)/86400000) };
}

function renderCountdown() {
  const cd = getCD();
  const el = document.getElementById('countdown-timer');
  if (el) el.textContent = fmtDur(cd.remaining);
  const bar = document.getElementById('progress-bar');
  if (bar) {
    const col = S.triggered?'#c94040':cd.pct>75?'#d4803a':'#c9a84c';
    bar.style.width = cd.pct+'%';
    bar.style.background = col;
  }
  const ring = document.getElementById('ring-pct');
  if (ring) ring.textContent = S.triggered ? '⚡' : Math.round(100-cd.pct)+'%';
  const ringEl = document.getElementById('ring-circle');
  if (ringEl) {
    const r=70, circ=2*Math.PI*r, dash=circ*Math.min(1,cd.pct/100);
    const col = S.triggered?'#c94040':cd.pct>75?'#d4803a':'#c9a84c';
    ringEl.setAttribute('stroke-dasharray',`${dash} ${circ}`);
    ringEl.setAttribute('stroke', col);
  }
  const daysEl = document.getElementById('ring-days');
  if (daysEl) daysEl.textContent = S.triggered ? 'TRIGGERED' : cd.daysLeft+'d left';
  const inactEl = document.getElementById('inactive-days');
  if (inactEl) inactEl.textContent = Math.floor(cd.elapsed/86400000)+'天';
}

setInterval(renderCountdown, 30000);

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if      (S.screen==='landing')   app.innerHTML = landingHTML();
  else if (S.screen==='setup')     app.innerHTML = setupHTML();
  else if (S.screen==='dashboard') app.innerHTML = dashHTML();
  bindEvents();
  if (S.screen==='dashboard') {
    renderCountdown();
    S.logs.forEach(e => addLog(e.msg, e.type)); // re-inject existing logs
    S.logs = []; // clear since addLog pushes fresh ones
  }
}

// ─── BIND EVENTS ──────────────────────────────────────────────────────────────
function bindEvents() {
  const $ = id => document.getElementById(id);

  if (S.screen==='landing') {
    $('btn-connect')?.addEventListener('click', connect);
  }

  if (S.screen==='setup') {
    $('inp-amount')?.addEventListener('input', e => {
      S.form.amount = e.target.value;
      const preview = $('usd-preview');
      if (preview && S.solPrice) preview.textContent = `≈ $${(parseFloat(e.target.value||0)*S.solPrice).toFixed(2)} USD`;
    });
    $('inp-memo')?.addEventListener('input', e => S.form.memo = e.target.value);
    $('inp-beneficiary')?.addEventListener('input', e => {
      S.form.beneficiary = e.target.value; S.secRes = null;
      const badge = $('sec-badge'); if (badge) badge.style.display='none';
    });
    document.querySelectorAll('.day-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        S.form.days = btn.dataset.days;
        document.querySelectorAll('.day-btn').forEach(b => {
          const active = b.dataset.days === S.form.days;
          b.style.background = active ? '#7a5f28' : 'var(--card)';
          b.style.borderColor = active ? '#c9a84c' : 'var(--border)';
          b.style.color = active ? '#e8c46a' : 'var(--dim)';
        });
        const trig = $('preview-trigger');
        if (trig) trig.textContent = S.form.days+'天无链上活动';
      });
    });
    $('btn-security')?.addEventListener('click', async () => {
      const btn = $('btn-security');
      btn.innerHTML = '<span class="spin">⟳</span>';
      await checkSecurity();
      btn.textContent = '安全审计';
      const badge = $('sec-badge');
      if (badge && S.secRes) {
        const ok = S.secRes.riskLevel !== 'high';
        badge.style.display = 'block';
        badge.style.background = ok ? 'rgba(60,184,122,.1)' : 'rgba(201,64,64,.1)';
        badge.style.borderColor = ok ? 'rgba(60,184,122,.35)' : 'rgba(201,64,64,.35)';
        badge.style.color = ok ? '#3cb87a' : '#c94040';
        badge.textContent = ok ? '✓ 低风险地址，安全审计通过 · Bitget Wallet Skill' : '⚠ 检测到风险 · Bitget Wallet Skill';
        const inp = $('inp-beneficiary');
        if (inp) inp.style.borderColor = ok ? '#3cb87a' : '#c94040';
      }
    });
    $('btn-next1')?.addEventListener('click', () => { S.step=2; render(); });
    $('btn-next2')?.addEventListener('click', () => { S.step=3; render(); });
    $('btn-back1')?.addEventListener('click', () => { S.step=1; render(); });
    $('btn-back2')?.addEventListener('click', () => { S.step=2; render(); });
    $('btn-deploy')?.addEventListener('click', deployWill);
  }

  if (S.screen==='dashboard') {
    $('btn-alive')?.addEventListener('click', imAlive);
